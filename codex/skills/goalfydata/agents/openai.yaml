interface:
  display_name: GoalfyData
  brand_color: '#6366F1'
  short_description: Use when the user needs deep data analysis (multi-round SQL queries, aggregation, trend comparison) or
    wants to persist data (Excel / CSV / API / databases) as a long-lived, cross-platform structured asset — typical scenarios
    include complex or repeated analysis, accessing the same data across multiple Agents / services / machines, sharing data
    with collaborators, and building a Dashboard on the data with public deployment and sharing. GoalfyData is independent
    of any single project or conversation and covers the full dataset lifecycle from table creation, import, query and analysis,
    governance rules, permission sharing, credential management, and GoalfyData Managed Refresh (scheduled auto-update) to
    Dashboard deployment.
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
  - type: mcp
    value: goalfydata-mcp
    transport: streamable_http
    url: https://mcp.goalfydata.ai/mcp
    bearer_token_env_var: GOALFY_UDS_API_KEY
